<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'self' https://*.trycloudflare.com; img-src data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <title>ARTART 에디터 허브</title>
  <style>
    :root { color-scheme: light; --ink:#11120f; --paper:#f3f1e9; --lime:#d9ff62; --muted:#73756d; --line:rgba(17,18,15,.13); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100dvh; display:grid; place-items:center; padding:24px; background:var(--paper); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
    main { width:min(100%,520px); }
    .brand { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-size:12px; font-weight:850; letter-spacing:.14em; }
    .live { display:inline-flex; gap:7px; align-items:center; letter-spacing:0; color:var(--muted); font-weight:700; }
    .dot { width:8px; height:8px; border-radius:50%; background:#c5c7be; }
    .dot.checking { background:#ffb84d; animation:pulse 1.2s infinite; }
    .dot.online { background:#4eae63; }
    .dot.offline { background:#e45e55; }
    .card { overflow:hidden; border:1px solid var(--line); border-radius:28px; background:#fff; box-shadow:0 24px 70px rgba(30,29,24,.10); }
    .hero { padding:42px 34px 34px; }
    .eyebrow { display:inline-block; margin-bottom:22px; padding:7px 11px; border-radius:999px; background:var(--lime); font-size:11px; font-weight:900; letter-spacing:.08em; }
    h1 { margin:0; font-size:clamp(34px,9vw,54px); line-height:.98; letter-spacing:-.055em; }
    .message { min-height:54px; margin:22px 0 0; color:var(--muted); font-size:16px; line-height:1.65; word-break:keep-all; }
    .actions { display:flex; gap:10px; padding:0 34px 34px; }
    button { width:100%; min-height:54px; border:0; border-radius:16px; background:var(--ink); color:#fff; font:inherit; font-weight:850; cursor:pointer; }
    button:disabled { background:#dadbd5; color:#8b8d86; cursor:wait; }
    .foot { padding:18px 34px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; line-height:1.55; }
    .updated { display:block; margin-top:4px; opacity:.78; }
    @keyframes pulse { 50% { opacity:.3; transform:scale(.8); } }
    @media (max-width:480px) { .hero { padding:34px 24px 28px; } .actions { padding:0 24px 28px; } .foot { padding:16px 24px; } }
  </style>
</head>
<body>
  <main>
    <div class="brand"><span>ARTART</span><span class="live"><i id="dot" class="dot checking"></i><span id="state">연결 확인 중</span></span></div>
    <section class="card">
      <div class="hero">
        <span class="eyebrow">EDITOR WORKSPACE</span>
        <h1>에디터 허브</h1>
        <p id="message" class="message">현재 사용할 수 있는 허브를 찾고 있어요. 잠시만 기다려 주세요.</p>
      </div>
      <div class="actions"><button id="retry" type="button" disabled>허브 여는 중…</button></div>
      <div class="foot">이 주소는 바뀌지 않습니다. 맥이 잠들어 있으면 연결이 돌아올 때까지 이 화면에서 자동으로 기다립니다.<span id="updated" class="updated"></span></div>
    </section>
  </main>
  <script>
    (() => {
      'use strict';
      const VALID = /^https:\/\/[a-z0-9-]+\.trycloudflare\.com$/;
      const dot = document.getElementById('dot');
      const state = document.getElementById('state');
      const message = document.getElementById('message');
      const retry = document.getElementById('retry');
      const updated = document.getElementById('updated');
      let timer = 0;
      let busy = false;

      function show(kind, title, text, button) {
        dot.className = `dot ${kind}`;
        state.textContent = title;
        message.textContent = text;
        retry.textContent = button;
        retry.disabled = kind === 'checking' || kind === 'online';
      }

      async function latestTarget() {
        const response = await fetch(`./target.json?t=${Date.now()}`, {
          cache: 'no-store',
        });
        if (!response.ok) throw new Error(`pointer ${response.status}`);
        const target = await response.json();
        if (!target || !VALID.test(target.url || '')) throw new Error('invalid target');
        return target;
      }

      async function hubIsOnline(url) {
        const response = await fetch(`${url}/health?entry=${Date.now()}`, {
          method: 'GET',
          mode: 'cors',
          credentials: 'omit',
          cache: 'no-store',
          redirect: 'follow',
        });
        return response.ok && response.headers.get('x-hub-version') === '3.0' && (await response.text()).trim() === 'ok';
      }

      async function connect() {
        if (busy) return;
        busy = true;
        clearTimeout(timer);
        show('checking', '연결 확인 중', '현재 사용할 수 있는 허브를 찾고 있어요. 잠시만 기다려 주세요.', '허브 여는 중…');
        try {
          const target = await latestTarget();
          if (target.updatedAt) {
            const date = new Date(target.updatedAt);
            updated.textContent = Number.isNaN(date.getTime()) ? '' : `최근 연결 갱신 ${date.toLocaleString('ko-KR')}`;
          }
          if (!(await hubIsOnline(target.url))) throw new Error('hub offline');
          show('online', '연결됨', '허브가 열렸어요. 자동으로 이동합니다.', '연결됨');
          window.setTimeout(() => window.location.replace(target.url), 250);
          return;
        } catch (_) {
          show('offline', '복구 대기 중', '맥이 잠들어 있거나 외부 연결을 복구 중이에요. 이 화면을 켜두면 자동으로 다시 확인합니다.', '지금 다시 확인');
          timer = window.setTimeout(connect, 20_000);
        } finally {
          busy = false;
        }
      }

      retry.addEventListener('click', connect);
      connect();
    })();
  </script>
</body>
</html>
